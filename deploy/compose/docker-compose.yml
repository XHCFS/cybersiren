# =============================================================================
# CyberSiren — Local Development Infrastructure
# =============================================================================
# Infrastructure-only compose file. Application services run natively
# via `make dev svc=<service-name>`.
#
# Usage:
#   make up              — start all infra (postgres, valkey, kafka, jaeger)
#   make up-infra        — start core infra without observability
#   make dev svc=svc-11  — start only the infra that svc-11-ti-sync needs
#   make demo svc=svc-03-url-analysis — full demo with monitoring stack
#   make demo svc=svc-11-ti-sync     — full demo with monitoring stack
#   make down            — stop all containers (preserves volumes)
#   make down-v          — stop all and destroy volumes
#
# Profiles:
#   postgres      — PostgreSQL 15
#   valkey        — Valkey cache
#   kafka         — Redpanda broker + topic init + Redpanda Console (Kafka API on :9092)
#   observability — Jaeger tracing UI
#   monitoring    — Prometheus + Grafana (metrics dashboards)
#   svc-03        — svc-03-url-analysis container
#   svc-04        — svc-04-header-analysis container
#   svc-06        — svc-06-nlp container (NLP email classifier demo)
#   svc-11        — svc-11-ti-sync container
#   demo          — svc-03 + monitoring + observability (backward compat)
# =============================================================================

# All env vars are sourced from deploy/compose/.env (copy .env.example first).

networks:
  cybersiren:
    driver: bridge

volumes:
  pgdata:
  valkeydata:
  redpandadata:

services:

  # ── PostgreSQL 15 ──────────────────────────────────────────────────────────
  # Primary relational store for all services that need persistence.
  postgres:
    image: postgres:15-alpine
    profiles: ["postgres", "demo"]
    container_name: cybersiren-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybersiren}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cybersiren
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Valkey (Redis-compatible cache) ────────────────────────────────────────
  # Used for rate-limiting, caching TI lookups, and deduplication.
  valkey:
    image: valkey/valkey:7-alpine
    profiles: ["valkey", "demo"]
    container_name: cybersiren-valkey
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkeydata:/data
    networks:
      - cybersiren
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redpanda (Kafka-API broker) ────────────────────────────────────────────
  # Single-binary KRaft-mode broker. Listens on 9092 (Kafka API to host),
  # 29092 (Kafka API on the cybersiren network), 9644 (admin API), 8081 (schema
  # registry, unused in v0). Container hostname is "kafka" so the existing
  # Makefile/profile name "kafka" stays meaningful.
  kafka:
    image: redpandadata/redpanda:v24.2.7
    profiles: ["kafka"]
    container_name: cybersiren-redpanda
    hostname: kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,HOST://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://kafka:29092,HOST://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=kafka:33145
      - --mode=dev-container
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "9644:9644"
    volumes:
      - redpandadata:/var/lib/redpanda/data
    networks:
      - cybersiren
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info -X brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  # ── Redpanda topic initializer ─────────────────────────────────────────────
  # One-shot container that creates the 12 pipeline topics with per-topic
  # retention/cleanup/compression then exits. Idempotent.
  kafka-init:
    image: redpandadata/redpanda:v24.2.7
    profiles: ["kafka"]
    container_name: cybersiren-redpanda-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka-init.sh:/kafka-init.sh:ro
    entrypoint: ["/bin/bash", "/kafka-init.sh"]
    environment:
      BOOTSTRAP_SERVER: "kafka:29092"
    networks:
      - cybersiren
    restart: "no"

  # ── Demo seed (one-shot migrations + seed data) ──────────────────────────
  # Runs automatically when any service profile is activated.
  demo-seed:
    image: postgres:15-alpine
    profiles: ["demo", "svc-03", "svc-04", "svc-06", "svc-11"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATABASE: ${POSTGRES_DB:-cybersiren}
    volumes:
      - ../../db/migrations:/migrations:ro
      - ../../db/seeds:/seeds:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Running migrations..."
        for f in /migrations/*.up.sql; do
          echo "  Applying $$(basename $$f)..."
          psql -f "$$f" 2>&1 || true
        done
        echo "Seeding feeds..."
        psql -f /seeds/feeds.sql
        echo "Seeding TI demo data..."
        psql -f /seeds/ti_demo_seed.sql
        echo "Seeding header rules..."
        psql -f /seeds/header_rules_demo_seed.sql
        echo "Demo seed complete."
    networks:
      - cybersiren
    restart: "no"

  # ── svc-03-url-analysis ───────────────────────────────────────────────────
  svc-03-url-analysis:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.url_analysis
    profiles: ["demo", "svc-03"]
    depends_on:
      demo-seed:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    ports:
      - "8083:8083"
      - "9091:9090"
    environment:
      CYBERSIREN_ENV: development
      CYBERSIREN_LOG__LEVEL: debug
      CYBERSIREN_LOG__PRETTY: "true"
      CYBERSIREN_SERVER__PORT: "8083"
      CYBERSIREN_DB__HOST: postgres
      CYBERSIREN_DB__PORT: "5432"
      CYBERSIREN_DB__NAME: cybersiren
      CYBERSIREN_DB__USER: ${POSTGRES_USER:-postgres}
      CYBERSIREN_DB__PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CYBERSIREN_DB__SSL_MODE: disable
      CYBERSIREN_VALKEY__ADDR: valkey:6379
      CYBERSIREN_AUTH__JWT_SECRET: demo-secret-not-for-production-use!!
      CYBERSIREN_ML__URL_MODEL_PATH: /app/ml/inference_script.py
      CYBERSIREN_METRICS_PORT: "9090"
      CYBERSIREN_JAEGER_ENDPOINT: http://jaeger:4318
    networks:
      - cybersiren
    restart: unless-stopped

  # ── svc-04-header-analysis ─────────────────────────────────────────────────
  # Consumes analysis.headers, evaluates rules, persists rule_hits, and
  # publishes scores.header. Stateless; scale horizontally by adding
  # replicas (Kafka partitioning handles distribution).
  svc-04-header-analysis:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.header_analysis
    profiles: ["svc-04"]
    depends_on:
      demo-seed:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "9094:9090"
    environment:
      CYBERSIREN_ENV: development
      CYBERSIREN_LOG__LEVEL: debug
      CYBERSIREN_LOG__PRETTY: "true"
      CYBERSIREN_DB__HOST: postgres
      CYBERSIREN_DB__PORT: "5432"
      CYBERSIREN_DB__NAME: cybersiren
      CYBERSIREN_DB__USER: ${POSTGRES_USER:-postgres}
      CYBERSIREN_DB__PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CYBERSIREN_DB__SSL_MODE: disable
      CYBERSIREN_VALKEY__ADDR: valkey:6379
      CYBERSIREN_AUTH__JWT_SECRET: demo-secret-not-for-production-use!!
      CYBERSIREN_METRICS_PORT: "9090"
      CYBERSIREN_JAEGER_ENDPOINT: http://jaeger:4318
      CYBERSIREN_KAFKA__BROKERS: kafka:29092
      CYBERSIREN_KAFKA__CLIENT_ID: svc-04-header-analysis
      CYBERSIREN_HEADER__CONSUME_TOPIC: analysis.headers
      CYBERSIREN_HEADER__PRODUCE_TOPIC: scores.header
      CYBERSIREN_HEADER__CONSUMER_GROUP: cg-header-analysis
      CYBERSIREN_HEADER__RULE_CACHE_TTL_SECONDS: "60"
      CYBERSIREN_HEADER__HOP_COUNT_THRESHOLD: "15"
      CYBERSIREN_HEADER__TIME_DRIFT_HOURS_THRESHOLD: "24"
      CYBERSIREN_HEADER__TYPOSQUAT_MAX_DISTANCE: "2"
      CYBERSIREN_HEADER__SCORING_BLEND: max
    networks:
      - cybersiren
    restart: unless-stopped

  # ── svc-06-nlp ─────────────────────────────────────────────────────────────
  # NLP email classifier. Runs the DistilBERT inference service (Python FastAPI)
  # alongside the Go HTTP wrapper that serves the demo UI and proxies /predict.
  # DEMO ONLY: not part of the production pipeline. Open http://localhost:8086.
  svc-06-nlp:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.nlp
    profiles: ["svc-06"]
    depends_on:
      demo-seed:
        condition: service_completed_successfully
    ports:
      - "8086:8086"
      - "9096:9090"
    environment:
      CYBERSIREN_ENV: development
      CYBERSIREN_LOG__LEVEL: debug
      CYBERSIREN_LOG__PRETTY: "true"
      CYBERSIREN_SERVER__PORT: "8086"
      # DB values satisfy shared/config.Validate() — svc-06 does not connect to Postgres.
      CYBERSIREN_DB__HOST: postgres
      CYBERSIREN_DB__PORT: "5432"
      CYBERSIREN_DB__NAME: cybersiren
      CYBERSIREN_DB__USER: ${POSTGRES_USER:-postgres}
      CYBERSIREN_DB__PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CYBERSIREN_DB__SSL_MODE: disable
      CYBERSIREN_AUTH__JWT_SECRET: demo-secret-not-for-production-use!!
      # Python NLP inference service runs in the same container on port 8001.
      CYBERSIREN_ML__NLP_SERVICE_URL: http://localhost:8001
      CYBERSIREN_METRICS_PORT: "9090"
      CYBERSIREN_JAEGER_ENDPOINT: http://jaeger:4318
    networks:
      - cybersiren
    restart: unless-stopped

  # ── svc-11-ti-sync ──────────────────────────────────────────────────────
  # Threat-intelligence feed synchroniser. Periodically fetches indicators
  # from PhishTank, OpenPhish, URLhaus, ThreatFox, and MalwareBazaar,
  # upserts them into Postgres, and refreshes the Valkey domain/hash cache.
  svc-11-ti-sync:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.ti_sync
    profiles: ["svc-11"]
    depends_on:
      demo-seed:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    ports:
      - "9093:9090"
    environment:
      CYBERSIREN_ENV: development
      CYBERSIREN_LOG__LEVEL: debug
      CYBERSIREN_LOG__PRETTY: "true"
      CYBERSIREN_DB__HOST: postgres
      CYBERSIREN_DB__PORT: "5432"
      CYBERSIREN_DB__NAME: cybersiren
      CYBERSIREN_DB__USER: ${POSTGRES_USER:-postgres}
      CYBERSIREN_DB__PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CYBERSIREN_DB__SSL_MODE: disable
      CYBERSIREN_VALKEY__ADDR: valkey:6379
      CYBERSIREN_AUTH__JWT_SECRET: demo-secret-not-for-production-use!!
      CYBERSIREN_METRICS_PORT: "9090"
      CYBERSIREN_JAEGER_ENDPOINT: http://jaeger:4318
      CYBERSIREN_SYNC_INTERVAL_SECONDS: "3600"
      CYBERSIREN_FEED_PHISHTANK_API_KEY: ${FEED_PHISHTANK_API_KEY:-}
      CYBERSIREN_FEED_THREATFOX_API_KEY: ${FEED_THREATFOX_API_KEY:-}
      CYBERSIREN_FEED_OPENPHISH_API_KEY: ${FEED_OPENPHISH_API_KEY:-}
      CYBERSIREN_FEED_MALWAREBAZAAR_API_KEY: ${FEED_MALWAREBAZAAR_API_KEY:-}
      CYBERSIREN_TI_HASH_CACHE_TTL_SECONDS: "7200"
    networks:
      - cybersiren
    restart: unless-stopped
  # All-in-one Jaeger instance for local development.
  # UI at http://localhost:16686, OTLP HTTP receiver on port 4318.
  # No persistence — traces are lost on restart.
  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles: ["observability", "demo"]
    container_name: cybersiren-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP
    networks:
      - cybersiren
    restart: unless-stopped

  # ── pgAdmin (Postgres web UI) ──────────────────────────────────────────────
  # Local dev only — credentials below are NOT for production.
  # Login: admin@cybersiren.dev / admin (override via PGADMIN_PASSWORD)
  # No volume — state is ephemeral for local dev.
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: ["postgres"]
    container_name: cybersiren-pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cybersiren.dev
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cybersiren
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/misc/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Prometheus (metrics scraper) ──────────────────────────────────────────
  # Scrapes /metrics from all CyberSiren services every 10 s.
  # Unreachable targets are marked "down" — safe when only one service runs.
  # UI at http://localhost:9092.
  prometheus:
    image: prom/prometheus:latest
    profiles: ["demo", "monitoring"]
    container_name: cybersiren-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - cybersiren
    restart: unless-stopped

  # ── Grafana (metrics dashboards) ───────────────────────────────────────────
  # Auto-provisioned with Prometheus datasource + per-service dashboards.
  # UI at http://localhost:3001. Login: admin / admin (skip password change).
  grafana:
    image: grafana/grafana:latest
    profiles: ["demo", "monitoring"]
    container_name: cybersiren-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - cybersiren
    restart: unless-stopped

  # ── Redpanda Console ───────────────────────────────────────────────────────
  # Web UI for browsing topics, consumer groups, and messages. Replaces
  # provectuslabs/kafka-ui from the Kafka era.
  kafka-ui:
    image: redpandadata/console:v2.7.2
    profiles: ["kafka"]
    container_name: cybersiren-redpanda-console
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_BROKERS: "kafka:29092"
      CONFIG_FILEPATH: ""
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - cybersiren
    restart: unless-stopped
