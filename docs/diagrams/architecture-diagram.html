</style>

<script>
     (function () {
          const svg = document.getElementById('architectureDiagram');
          const viewport = document.getElementById('diagramViewport');
          const zoomInButton = document.getElementById('zoomInButton');
          const zoomOutButton = document.getElementById('zoomOutButton');
          const resetZoomButton = document.getElementById('resetZoomButton');
          const zoomStatus = document.getElementById('zoomStatus');

          if (!svg || !viewport || !zoomInButton || !zoomOutButton || !resetZoomButton || !zoomStatus) {
               return;
          }

          const originalViewBox = [0, 0, 3400, 2400];
          const [originX, originY, originWidth, originHeight] = originalViewBox;
          const minZoom = 1;
          const maxZoom = 8;
          const zoomStep = 1.2;
          let viewBox = originalViewBox.slice();
          let dragState = null;

          function clamp(value, min, max) {
               return Math.min(max, Math.max(min, value));
          }

          function getCurrentZoom() {
               return originWidth / viewBox[2];
          }

          function applyViewBox() {
               svg.setAttribute('viewBox', viewBox.join(' '));
               zoomStatus.textContent = `${Math.round(getCurrentZoom() * 100)}%`;
          }

          function setViewBox(nextX, nextY, nextWidth) {
               const clampedWidth = clamp(nextWidth, originWidth / maxZoom, originWidth / minZoom);
               const nextHeight = clampedWidth * (originHeight / originWidth);
               const maxX = originX + originWidth - clampedWidth;
               const maxY = originY + originHeight - nextHeight;

               viewBox = [
                    clamp(nextX, originX, maxX),
                    clamp(nextY, originY, maxY),
                    clampedWidth,
                    nextHeight
               ];

               applyViewBox();
          }

          function getAnchorPoint(clientX, clientY) {
               if (typeof clientX !== 'number' || typeof clientY !== 'number') {
                    return {
                         x: viewBox[0] + (viewBox[2] / 2),
                         y: viewBox[1] + (viewBox[3] / 2)
                    };
               }

               const ctm = svg.getScreenCTM();
               if (!ctm) {
                    return {
                         x: viewBox[0] + (viewBox[2] / 2),
                         y: viewBox[1] + (viewBox[3] / 2)
                    };
               }

               const point = svg.createSVGPoint();
               point.x = clientX;
               point.y = clientY;
               return point.matrixTransform(ctm.inverse());
          }

          function zoom(factor, clientX, clientY) {
               const currentZoom = getCurrentZoom();
               const nextZoom = clamp(currentZoom * factor, minZoom, maxZoom);

               if (nextZoom === currentZoom) {
                    return;
               }

               const anchor = getAnchorPoint(clientX, clientY);
               const relX = (anchor.x - viewBox[0]) / viewBox[2];
               const relY = (anchor.y - viewBox[1]) / viewBox[3];
               const nextWidth = originWidth / nextZoom;
               const nextHeight = originHeight / nextZoom;
               const nextX = anchor.x - (relX * nextWidth);
               const nextY = anchor.y - (relY * nextHeight);

               setViewBox(nextX, nextY, nextWidth);
          }

          function pan(deltaX, deltaY) {
               const rect = svg.getBoundingClientRect();
               if (!rect.width || !rect.height) {
                    return;
               }

               const nextX = viewBox[0] - (deltaX * (viewBox[2] / rect.width));
               const nextY = viewBox[1] - (deltaY * (viewBox[3] / rect.height));
               setViewBox(nextX, nextY, viewBox[2]);
          }

          function resetZoom() {
               viewBox = originalViewBox.slice();
               applyViewBox();
          }

          function stopDragging(event) {
               if (!dragState || dragState.pointerId !== event.pointerId) {
                    return;
               }

               dragState = null;
               viewport.classList.remove('is-dragging');

               if (viewport.hasPointerCapture(event.pointerId)) {
                    viewport.releasePointerCapture(event.pointerId);
               }
          }

          zoomInButton.addEventListener('click', () => zoom(zoomStep));
          zoomOutButton.addEventListener('click', () => zoom(1 / zoomStep));
          resetZoomButton.addEventListener('click', resetZoom);

          viewport.addEventListener('wheel', (event) => {
               event.preventDefault();
               zoom(event.deltaY < 0 ? zoomStep : 1 / zoomStep, event.clientX, event.clientY);
          }, { passive: false });

          viewport.addEventListener('pointerdown', (event) => {
               if (event.pointerType === 'mouse' && event.button !== 0) {
                    return;
               }

               dragState = {
                    pointerId: event.pointerId,
                    x: event.clientX,
                    y: event.clientY
               };

               viewport.classList.add('is-dragging');
               viewport.setPointerCapture(event.pointerId);
          });

          viewport.addEventListener('pointermove', (event) => {
               if (!dragState || dragState.pointerId !== event.pointerId) {
                    return;
               }

               pan(event.clientX - dragState.x, event.clientY - dragState.y);
               dragState = {
                    pointerId: dragState.pointerId,
                    x: event.clientX,
                    y: event.clientY
               };
          });

          viewport.addEventListener('pointerup', stopDragging);
          viewport.addEventListener('pointercancel', stopDragging);

          viewport.addEventListener('pointerleave', (event) => {
               if (event.pointerType === 'mouse' && dragState && dragState.pointerId === event.pointerId && !(event.buttons & 1)) {
                    stopDragging(event);
               }
          });

          window.addEventListener('keydown', (event) => {
               if (event.key === '+' || event.key === '=') {
                    zoom(zoomStep);
               } else if (event.key === '-') {
                    zoom(1 / zoomStep);
               } else if (event.key === '0') {
                    resetZoom();
               } else {
                    return;
               }

               event.preventDefault();
          });

          applyViewBox();
     }());
</script>
