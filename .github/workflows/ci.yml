name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build all packages
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: Run tests (short mode)
        run: go test -short -race -timeout 120s -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout 5m

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: cybersiren
          POSTGRES_PASSWORD: cybersiren
          POSTGRES_DB: cybersiren_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.18.1/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        env:
          DATABASE_URL: postgres://cybersiren:cybersiren@localhost:5432/cybersiren_test?sslmode=disable
        run: migrate -path db/migrations -database "$DATABASE_URL" up

      - name: Run integration tests
        env:
          CYBERSIREN_DB__HOST: localhost
          CYBERSIREN_DB__PORT: "5432"
          CYBERSIREN_DB__NAME: cybersiren_test
          CYBERSIREN_DB__USER: cybersiren
          CYBERSIREN_DB__PASSWORD: cybersiren
          CYBERSIREN_DB__SSLMODE: disable
          CYBERSIREN_AUTH__JWT_SECRET: ci-test-secret-not-for-production
          VALKEY_ADDR: localhost:6379
        run: go test -race -timeout 120s ./...

  release:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: [build-and-test, lint, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - { name: ti-sync,              dockerfile: deploy/docker/Dockerfile.ti_sync }
          - { name: url-analysis,         dockerfile: deploy/docker/Dockerfile.url_analysis }
          - { name: api-dashboard,        dockerfile: deploy/docker/Dockerfile.api_dashboard }
          - { name: aggregator,           dockerfile: deploy/docker/Dockerfile.aggregator }
          - { name: parser,               dockerfile: deploy/docker/Dockerfile.parser }
          - { name: ingestion,            dockerfile: deploy/docker/Dockerfile.ingestion }
          - { name: header-analysis,      dockerfile: deploy/docker/Dockerfile.header_analysis }
          - { name: attachment-analysis,  dockerfile: deploy/docker/Dockerfile.attachment_analysis }
          - { name: decision,             dockerfile: deploy/docker/Dockerfile.decision }
          - { name: notification,         dockerfile: deploy/docker/Dockerfile.notification }
          - { name: nlp,                  dockerfile: deploy/docker/Dockerfile.nlp }

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service.name }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service.name }}:${{ github.sha }}
